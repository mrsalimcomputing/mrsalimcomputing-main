<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR GCSE Computing</title>

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="style.css">

    <!-- KS4‑ONLY STYLES -->
    <link rel="stylesheet" href="ks4.css">
</head>

<body>

    <!-- 🔹 BACK BUTTON -->
    <button class="back-btn" onclick="goBack()">Back</button>

    <!-- 🔹 WELCOME BANNER -->
    <div id="userWelcome" class="welcome-banner" style="text-align:center; width:100%;"></div>

    <!-- 🔹 LANGUAGE SELECTOR -->
    <div class="language-selector" style="position:absolute; top:15px; right:110px;">
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <!-- 🔹 LOGOUT BUTTON -->
    <button id="logoutBtn" class="logout-btn" style="top:15px; right:20px;">Logout</button>

    <!-- ============================================================
         KS4 CONTAINER (STATIC + CENTERED LIKE KS3)
         ============================================================ -->
    <div class="ks4-container">

        <div class="menu-screen">
            <h1 class="menu-title">OCR GCSE Computing</h1>
            <p class="menu-subtitle">Choose a Topic Category:</p>

            <div class="ks4-grid" id="ks4Screen"></div>
        </div>

    </div>

    <!-- 🔹 USER HEADER SCRIPT -->
    <script type="module" src="js/headerUser.js"></script>

    <!-- 🔹 LOAD OCR TOPICS -->
    <script type="module">
        import { ks4Topics } from "./js/KS4/ks4Topics.js";

        const course = "OCR_GCSE";
        const courseData = ks4Topics[course];
        const container = document.getElementById("ks4Screen");

        Object.keys(courseData).forEach(unitName => {
            const btn = document.createElement("button");
            btn.className = "ks4-btn";   // 🔥 NEW CLASS
            btn.innerText = unitName;

            btn.onclick = () => {
                window.location.href =
                    `ks4-unit.html?course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unitName)}`;
            };

            container.appendChild(btn);
        });
    </script>

    <!-- 🔹 BACK + LANGUAGE LOGIC -->
    <script>
        function goBack() {
            if (document.referrer !== "") {
                window.history.back();
            } else {
                window.location.href = "ks4.html";
            }
        }

        function changeLanguage(lang) {
            alert("Language changed to: " + lang);
        }
    </script>

</body>
</html>
