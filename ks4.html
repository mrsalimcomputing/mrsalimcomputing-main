<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS4 Options</title>

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="style.css">

    <!-- KS4‑ONLY STYLES -->
    <link rel="stylesheet" href="ks4.css">
</head>

<body>

    <!-- 🔹 BACK BUTTON -->
    <button class="back-btn" onclick="goBack()">Back</button>

    <!-- 🔹 WELCOME BANNER -->
    <div id="userWelcome" class="welcome-banner" style="text-align:center; width:100%;"></div>

    <!-- 🔹 LANGUAGE SELECTOR -->
    <div class="language-selector" style="position:absolute; top:15px; right:110px;">
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <!-- 🔹 LOGOUT BUTTON -->
    <button id="logoutBtn" class="logout-btn" style="top:15px; right:20px;">Logout</button>

    <!-- ============================================================
         KS4 CONTAINER (STATIC + CENTERED LIKE KS3)
         ============================================================ -->
    <div class="ks4-container">
        <div class="menu-screen">
            <h1 class="menu-title">KS4 Options</h1>
            <p class="menu-subtitle">Choose your qualification:</p>

            <div class="ks4-grid">

                <!-- 🔒 LOCKED GCSE BUTTON -->
                <button class="ks4-btn locked" onclick="alert('OCR GCSE Computer Science is locked — Coming Soon!')">
                    OCR GCSE Computer Science 🔒 Coming Soon
                </button>

                <!-- 🔒 LOCKED IMEDIA BUTTON -->
                <button class="ks4-btn locked" onclick="alert('OCR Cambridge Nationals in Creative iMedia Level 2 is locked — Coming Soon!')">
                    OCR Cambridge Nationals in Creative iMedia Level 2 🔒 Coming Soon
                </button>

                <!-- ✅ ACTIVE IT BUTTON -->
                <button class="ks4-btn" onclick="window.location.href='ks4-cambridge.html'">
                    OCR Cambridge Nationals in IT Level 2
                </button>

            </div>
        </div>
    </div>

    <!-- 🔹 USER HEADER SCRIPT -->
    <script type="module" src="js/headerUser.js"></script>

    <!-- 🔹 FIXED KS4 BACK BUTTON -->
    <script type="module">
        import { goBackKS4 } from "./ks4-navigation.js";
        window.goBack = goBackKS4;

        function changeLanguage(lang) {
            alert("Language changed to: " + lang);
        }
    </script>

</body>
</html>
