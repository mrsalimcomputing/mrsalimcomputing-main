<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS4 Unit</title>

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="style.css">

    <!-- KS4‑ONLY STYLES -->
    <link rel="stylesheet" href="ks4.css">
</head>

<body>

    <!-- 🔹 BACK BUTTON -->
    <button class="back-btn" onclick="goBack()">Back</button>

    <!-- 🔹 WELCOME BANNER -->
    <div id="userWelcome" class="welcome-banner" style="text-align:center; width:100%;"></div>

    <!-- 🔹 LANGUAGE SELECTOR -->
    <div class="language-selector" style="position:absolute; top:15px; right:110px;">
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <!-- 🔹 LOGOUT BUTTON -->
    <button id="logoutBtn" class="logout-btn" style="top:15px; right:20px;">Logout</button>

    <!-- ============================================================
         KS4 CONTAINER
         ============================================================ -->
    <div class="ks4-container">

        <div class="menu-screen">
            <h1 class="menu-title" id="unitTitle">KS4 Unit</h1>
            <p class="menu-subtitle">Choose a Topic:</p>

            <div id="unitButtons" class="ks4-grid"></div>
        </div>

    </div>

    <!-- 🔹 USER HEADER SCRIPT -->
    <script type="module" src="./headerUser.js"></script>

    <!-- 🔹 LOAD KS4 TOPICS -->
    <script type="module">
        import { ks4Topics } from "./ks4Topics.js";

        const params = new URLSearchParams(window.location.search);
        const course = decodeURIComponent(params.get("course"));
        const unit = decodeURIComponent(params.get("unit"));

        document.getElementById("unitTitle").innerText = unit;

        const unitData = ks4Topics[course][unit];
        const container = document.getElementById("unitButtons");

        unitData.mainTopics.forEach((topic, index) => {
            const btn = document.createElement("button");
            const cleanTopic = topic.replace(/^\d+(\.\d+)?\s*/, "").trim();

            // ⭐ FIRST BUTTON UNLOCKED ("Design Tools")
            if (
          topic === "Design Tools" ||
          topic === "Data and testing" ){
                btn.className = "ks4-btn";
                btn.innerText = topic;

                btn.onclick = () => {
                    window.location.href =
                        `ks4-topics.html?course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}&topic=${encodeURIComponent(cleanTopic)}`;
                };
            }

            // 🔒 ALL OTHER BUTTONS LOCKED
            else {
                btn.className = "ks4-btn locked";
                btn.innerHTML = `${topic} 🔒`;
                btn.onclick = () => alert(`${cleanTopic} is locked 🔒 — Coming Soon!`);
            }

            container.appendChild(btn);
        });

    </script>

    <!-- 🔹 FIXED KS4 BACK BUTTON -->
    <script type="module">
        import { goBackKS4 } from "./ks4-navigation.js";
        window.goBack = goBackKS4;

        function changeLanguage(lang) {
            alert("Language changed to: " + lang);
        }
    </script>

</body>
</html>
