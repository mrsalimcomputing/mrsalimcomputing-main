<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS4 Topic Options</title>

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="style.css">

    <!-- KS4‑ONLY STYLES -->
    <link rel="stylesheet" href="ks4.css">
</head>

<body>

    <!-- 🔹 BACK BUTTON -->
    <button class="back-btn" onclick="goBack()">Back</button>

    <!-- 🔹 WELCOME BANNER -->
    <div id="userWelcome" class="welcome-banner" style="text-align:center; width:100%;"></div>

    <!-- 🔹 LANGUAGE SELECTOR -->
    <div class="language-selector" style="position:absolute; top:15px; right:110px;">
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <!-- 🔹 LOGOUT BUTTON -->
    <button id="logoutBtn" class="logout-btn" style="top:15px; right:20px;">Logout</button>

    <!-- ============================================================
         KS4 CONTAINER
         ============================================================ -->
    <div class="ks4-container">

        <div class="menu-screen">
            <h1 class="menu-title" id="topicTitle">KS4 Topic</h1>
            <p class="menu-subtitle" id="subtitle">Choose an activity:</p>

            <div id="buttonContainer" class="ks4-grid"></div>
        </div>

    </div>

    <!-- 🔹 USER HEADER SCRIPT -->
    <script type="module" src="./headerUser.js"></script>

    <!-- 🔹 TOPIC OPTIONS LOGIC -->
    <script type="module">
        import { getCurrentUser } from "./userManager.js";

        const user = getCurrentUser();
        window.isPlayMode = !user;

        const params = new URLSearchParams(window.location.search);
        const course = decodeURIComponent(params.get("course"));
        const unit = decodeURIComponent(params.get("unit"));
        const topic = decodeURIComponent(params.get("topic"));

        document.getElementById("topicTitle").innerText = topic;

        const container = document.getElementById("buttonContainer");

        function addButton(label, url) {
            const btn = document.createElement("button");
            btn.className = "ks4-btn";
            btn.innerText = label;
            btn.onclick = () => window.location.href = url;
            container.appendChild(btn);
        }

        function loadOptions() {
            const t = topic.toLowerCase();

            const binaryTopics = [
                "binary",
                "hex",
                "binary addition",
                "binary shifts",
                "binary to denary",
                "denary to binary"
            ];

            const matchingOnlyTopics = [
                "input/output devices",
                "hardware components"
            ];

            // ⭐ Binary topics → ONLY Binary Quiz
            if (binaryTopics.some(b => t.includes(b))) {
                addButton(
                    "Binary Quiz",
                    `binary-quiz.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
                );

                if (!window.isPlayMode) {
                    addButton(
                        "Leaderboard",
                        `leaderboard.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
                    );
                }
                return;
            }

            // ⭐ Matching-only topics → ONLY Matching Game
            if (matchingOnlyTopics.some(m => t.includes(m))) {
                addButton(
                    "Matching Game",
                    `matching-game.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
                );

                if (!window.isPlayMode) {
                    addButton(
                        "Leaderboard",
                        `leaderboard.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
                    );
                }
                return;
            }

            // ⭐ Everything else → ALL THREE MODES
            addButton(
                "Theory Quiz",
                `theory-quiz.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
            );

            addButton(
                "Matching Game",
                `matching-game.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
            );

            addButton(
                "Exam Mode",
                `exam-mode.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
            );

            if (!window.isPlayMode) {
                addButton(
                    "Leaderboard",
                    `leaderboard.html?topic=${encodeURIComponent(topic)}&course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}`
                );
            }
        }

        loadOptions();
    </script>

    <!-- 🔹 FIXED KS4 BACK BUTTON -->
    <script type="module">
        import { goBackKS4 } from "./ks4-navigation.js";
        window.goBack = goBackKS4;

        function changeLanguage(lang) {
            alert("Language changed to: " + lang);
        }
    </script>

</body>
</html>
