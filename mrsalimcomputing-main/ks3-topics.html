<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KS3 Subtopics</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- BACK BUTTON -->
  <button class="back-btn" onclick="goBack()">Back</button>

  <!-- WELCOME -->
  <div id="userWelcome" class="welcome-banner" style="text-align:center; width:100%;"></div>

  <!-- LANGUAGE -->
  <div class="language-selector" style="position:absolute; top:15px; right:110px;">
    <select id="languageSelect" onchange="changeLanguage(this.value)">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
      <option value="ar">العربية</option>
    </select>
  </div>

  <!-- LOGOUT -->
  <button id="logoutBtn" class="logout-btn" style="top:15px; right:20px;">Logout</button>

  <!-- MAIN -->
  <div id="ks3Screen" class="menu-screen">
    <h1 class="menu-title" id="categoryTitle">KS3 Subtopics</h1>
    <p class="menu-subtitle">Choose a Topic:</p>
    <div id="topicButtons" class="button-row"></div>
  </div>

  <!-- USER HEADER -->
  <script type="module" src="./headerUser.js"></script>

  <!-- KS3 TOPICS LOGIC -->
  <script type="module">
    import { ks3Topics } from "./ks3Topics.js";

    console.log("🔵 KS3 Topics page loaded");

    const params = new URLSearchParams(window.location.search);
    const courseParam   = params.get("course");
    const unitParam     = params.get("unit");
    const categoryParam = params.get("category"); // legacy support

    // Prefer `unit`, fallback to `category`
    const unit = decodeURIComponent(unitParam || categoryParam || "");
    const course = decodeURIComponent(courseParam || "KS3");

    console.log("📄 URL Params:", Object.fromEntries(params.entries()));
    console.log("🧩 Resolved course:", course);
    console.log("🧩 Resolved unit:", unit);
    console.log("🗂 ks3Topics keys:", Object.keys(ks3Topics));

    const title = document.getElementById("categoryTitle");
    const container = document.getElementById("topicButtons");

    if (!unit || !ks3Topics[unit]) {
      console.warn("⚠ Missing or invalid unit:", unit);
      title.innerText = "No unit selected";
      container.innerHTML = "<p style='color:#ccc;'>Please go back and select a valid KS3 unit.</p>";
    } else {
      title.innerText = unit;
      const topics = ks3Topics[unit];

      topics.forEach(topic => {
        const btn = document.createElement("button");
        btn.className = "menu-btn";
        btn.innerText = topic;

        if (
          topic === "Data Types" ||
          topic === "Variables and Values" ||
          topic === "Health and Safety Act" ||
          topic === "Computer Misuse Act" ||
          topic === "Data Protection Act" ||
          topic === "Scratch" ||
          topic === "Maths / Arithmetic" ||
          topic === "State the Output (If/Else)" ||
          topic === "Sequence, Selection, Iteration" ||
          topic === "Bandwidth and Types of Cables" 
        ) {
          btn.onclick = () => {
            console.log(`➡️ KS3 → topic options for: ${topic}`);
            window.location.href =
              `ks3-topic-options.html?course=${encodeURIComponent(course)}&unit=${encodeURIComponent(unit)}&topic=${encodeURIComponent(topic)}`;
          };
        } else {
          btn.classList.add("locked");
          btn.innerHTML = `${topic} <span style="font-weight:700;">🔒</span>`;
          btn.onclick = () => alert(`${topic} is locked — Coming Soon!`);
        }

        container.appendChild(btn);
      });
    }

    function changeLanguage(lang) {
      alert("Language changed to: " + lang);
    }
  </script>

  <!-- WIRE KS3 BACK BUTTON TO navigation.js -->
  <script type="module">
    import { goBack as goBackKS3 } from "./navigation.js";
    window.goBack = goBackKS3;
  </script>
</body>
</html>
